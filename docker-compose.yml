version: '3.8'

services:
  # Endee Vector Database
  endee:
    image: endeeio/endee-server:latest
    container_name: errorlens-endee
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          memory: 5G  # RAM limit for stability
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - errorlens-network

  # ErrorLens Backend API
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: errorlens-backend
    ports:
      - "8000:8000"
    environment:
      - ENDEE_URL=http://endee:8080
      - GROQ_API_KEY=${GROQ_API_KEY}
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8000
    depends_on:
      endee:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    networks:
      - errorlens-network
    volumes:
      - ./data:/app/data:ro  # Mount demo data as read-only

  # ErrorLens Frontend UI
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: errorlens-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:8000
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 30s
    networks:
      - errorlens-network

networks:
  errorlens-network:
    driver: bridge

volumes:
  endee-data:
    driver: local

# Development Usage:
# 
# Full Stack (Production):
#   docker compose up --build
#
# Endee Only (Development):
#   docker compose up endee -d
#   python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000
#   streamlit run frontend/streamlit_app.py --server.port 8501
#
# Services will be available at:
#   - Endee: http://localhost:8080
#   - Backend API: http://localhost:8000
#   - Frontend UI: http://localhost:8501
#   - API Docs: http://localhost:8000/docs
